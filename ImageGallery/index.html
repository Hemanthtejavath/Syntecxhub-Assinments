<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="gallery-header" aria-labelledby="page-title">
        <h1 id="page-title">Image Gallery App</h1>
        <p class="intro">
          A clean responsive gallery with smooth hover zoom, fade effects, and
          image captions.
        </p>
      </section>

      <section
        class="gallery-grid"
        id="gallery"
        aria-label="Image gallery"
      ></section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="close-lightbox" id="closeLightbox" type="button" aria-label="Close image">
        &times;
      </button>
      <div class="lightbox-content" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
        <img id="lightboxImage" src="" alt="">
        <div class="lightbox-caption">
          <h2 id="lightboxTitle"></h2>
          <p id="lightboxText"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
